<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Event Information (Searchable Table)">
    <meta name="author" content="Oliver Scott">
    <title>Registration Form</title>
    <link rel="stylesheet" href="styles/styles.css">  <!-- Link to your custom CSS file -->
    <script defer src="scripts/scripts.js"></script> <!-- Link to your custom JavaScript file -->
    <!-- Include Bootstrap CSS from CDN (Not recommended for production)-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="js/vue.js"></script>
    <script defer src="js/register.js"></script>
</head>
<body>
    <header>
        <div class="container">
            <div class="col-12">
                <h1 class="grid-demo">Registration Form</h1>
            </div>
        </div>
    </header>
    
    <main>
        <div id="app" class="container">
            <h2>Login Information</h2>
            <div class="d-flex flex-wrap align-items-center mb-3">
                <div class="d-flex align-items-center me-3 mb-2">
                    <label for="rName" class="me-2">Enter user name: </label>
                    <input type="text" id="rName" v-model="eventObj.rName" class="form-control" style="width: 150px;"/>
                </div>
                <div class="d-flex align-items-center me-3 mb-2">
                    <label for="rPW" class="me-2">Enter password: </label>
                    <input type="password" id="rPW" v-model="eventObj.rPW" class="form-control" style="width: 200px;"/>
                </div>
                <div class="d-flex align-items-center mb-2">
                    <label for="rPWd" class="me-2">Re-enter password: </label>
                    <input type="password" id="rPWd" v-model="eventObj.rPWd" class="form-control" style="width: 150px;"/>
                </div>
            </div>
            <div class="container">
                <div class="row">
                    <div class="col-6">
                        <h2>Event Category</h2>
                        <div class="mb-3">
                            <label class="fw-bold">Category</label><br>
                            <input type="radio" id="business" v-model="eventObj.category" value="Business">
                            <label for="business">Business</label><br>
                            <input type="radio" id="technology" v-model="eventObj.category" value="Technology">
                            <label for="technology">Technology</label><br>
                            <input type="radio" id="finance" v-model="eventObj.category" value="Finance">
                            <label for="finance">Finance</label><br>
                            <input type="radio" id="marketing" v-model="eventObj.category" value="Marketing">
                            <label for="marketing">Marketing</label><br>
                            <input type="radio" id="all" v-model="eventObj.category" value="All">
                            <label for="all">All</label><br>
                        </div>
                    </div>
                    <div class="col-6">
                        <h2>Event Name</h2>
                        <div class="mb-3">
                            <label for="eName">Select event Name: </label>
                            <select name="eName" id="eName" v-model="eventObj.selectedEvent">
                                <option value="" disabled>-- Select an Event --</option>
                                <option v-for="event in eventNames" :key="event.eventid" :value="event.eventid">
                                    {{event.eventname}}
                                </option>
                            </select>

                        </div>
                    </div>
                </div>
            </div>
            <div class="container">
                <div class="row">
                            <!-- rName is there   rPW is there    rPWd is there     if selectedEvent has been chosen  if rPw and rPwd are equal -->
                    <div v-if="eventObj.rName  && eventObj.rPW && eventObj.rPWd &&  eventObj.selectedEvent &&        eventObj.rPW === eventObj.rPWd">
                        <h2>Summary</h2>
                        <ul>
                            <li>Username: {{eventObj.rName}}</li>
                            <li>Category: {{eventObj.category}}</li>
                            <li>Event Name: {{selectedEventName}}</li>
                        </ul>
                    </div>
                    <div v-else>
                        <h2>Summary</h2>
                        <ul>
                            <li>Username: </li>
                            <li>Category: </li>
                            <li>Event Name: </li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </main>
    
    <footer>
        <div class="container">
            <div class="col-12">
                <p class="grid-demo">&copy; 2025 Oliver Scott. All rights reserved.</p>
            </div>
        </div>
    </footer>
</body>
</html>
